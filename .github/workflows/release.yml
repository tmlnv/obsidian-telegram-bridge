name: Release Obsidian plugin

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: plugin/package-lock.json

      - name: Install plugin dependencies
        run: npm ci
        working-directory: plugin

      - name: Build plugin
        run: npm run build
        working-directory: plugin

      - name: Verify manifest version matches tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "Tag $TAG does not match manifest.json version $MANIFEST_VERSION" >&2
            exit 1
          fi

      - name: Assemble release assets
        run: |
          mkdir -p release
          cp manifest.json release/manifest.json
          cp plugin/main.js release/main.js
          cp plugin/styles.css release/styles.css

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            release/manifest.json
            release/main.js
            release/styles.css
